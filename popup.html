<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<title>CookieEdit</title>
<style>
  body { font-family: "Segoe UI", Arial, sans-serif; width: 380px; padding: 10px; }
  h3 { margin: 0 0 4px 0; font-size: 14px; }
  #domain { font-size: 11px; color: #666; margin-bottom: 8px; word-break: break-all; }
  #list { max-height: 260px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
  .item { border-bottom: 1px solid #eee; padding: 6px; }
  .item:last-child { border-bottom: none; }
  .item .name { font-weight: 600; font-size: 12px; }
  .item .meta { font-size: 10px; color: #888; margin-bottom: 4px; }
  .item textarea {
    width: 100%; box-sizing: border-box; font-size: 11px; font-family: Consolas, monospace;
    resize: vertical; min-height: 28px; padding: 3px;
  }
  .item .actions { display: flex; gap: 6px; margin-top: 4px; }
  .item .actions button { flex: 1; padding: 3px; font-size: 11px; cursor: pointer; }
  .empty { padding: 10px; font-size: 12px; color: #888; text-align: center; }
  .toolbar { display: flex; gap: 6px; margin-top: 8px; }
  .toolbar button { flex: 1; padding: 6px; font-size: 12px; cursor: pointer; }
  fieldset { margin-top: 10px; border: 1px solid #ddd; border-radius: 4px; padding: 8px; }
  legend { font-size: 12px; padding: 0 4px; }
  fieldset label { display: block; font-size: 11px; margin-top: 6px; }
  fieldset input[type=text] { width: 100%; box-sizing: border-box; padding: 3px; font-size: 11px; }
  fieldset .row2 { display: flex; gap: 6px; }
  fieldset .row2 > div { flex: 1; }
  #btnAdd { width: 100%; margin-top: 8px; padding: 6px; cursor: pointer; }
  #status { font-size: 11px; margin-top: 6px; min-height: 14px; }
  .ok { color: #1a7f37; } .bad { color: #c62828; }
</style>
</head>
<body>
  <h3>CookieEdit</h3>
  <div id="domain">Đang tải tab...</div>
  <div id="list"><div class="empty">Đang tải cookie...</div></div>

  <div class="toolbar">
    <button id="btnRefresh">Làm mới</button>
    <button id="btnExport">Xuất JSON</button>
  </div>

  <fieldset>
    <legend>Thêm cookie mới</legend>
    <label>Tên
      <input type="text" id="newName" placeholder="tên cookie">
    </label>
    <label>Giá trị
      <input type="text" id="newValue" placeholder="giá trị">
    </label>
    <div class="row2">
      <div>
        <label>Path
          <input type="text" id="newPath" value="/">
        </label>
      </div>
      <div>
        <label>Domain (để trống = domain tab)
          <input type="text" id="newDomain" placeholder="tuỳ chọn">
        </label>
      </div>
    </div>
    <button id="btnAdd">Thêm cookie</button>
  </fieldset>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
